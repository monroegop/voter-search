<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Registry Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Code+Pro:wght@400;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #09090f;
    --surface:   #0f1018;
    --surface2:  #141620;
    --border:    #1c2030;
    --border2:   #252a3a;
    --gold:      #c9a96e;
    --gold-dim:  rgba(201,169,110,0.15);
    --text:      #e2ddd4;
    --text-dim:  #8a8478;
    --text-mute: #3e4454;
    --red:       #ef4444;
    --blue:      #3b82f6;
    --green:     #22c55e;
    --purple:    #8b5cf6;
    --orange:    #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0d0e18 0%, transparent 100%);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; letter-spacing: -0.02em; }
  .logo span { color: var(--gold); }
  .header-meta { font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  #record-count { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-dim); }
  #record-count strong { color: var(--gold); }

  /* ── Buttons ── */
  .btn {
    font-family: 'Source Code Pro', monospace; font-size: 12px; letter-spacing: 0.04em;
    padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-primary { background: var(--gold); color: #09090f; border-color: var(--gold); font-weight: 600; }
  .btn-primary:hover { background: #d4b47a; border-color: #d4b47a; color: #09090f; }

  /* ── Layout ── */
  main { padding: 28px 36px; }

  /* ── Upload zone ── */
  #upload-section { margin-bottom: 28px; }
  #drop-zone {
    border: 2px dashed var(--border2); border-radius: 8px;
    padding: 52px 40px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.over { border-color: var(--gold); background: var(--gold-dim); }
  #drop-zone .dz-icon { font-size: 44px; margin-bottom: 14px; }
  #drop-zone .dz-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); margin-bottom: 8px; }
  #drop-zone .dz-sub { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-mute); line-height: 1.9; }
  #file-input { display: none; }

  /* ── Progress ── */
  #progress-wrap { display: none; margin-top: 20px; }
  #progress-bar-outer { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #progress-bar-inner { height: 100%; width: 0%; background: var(--gold); transition: width 0.3s; border-radius: 2px; }
  #progress-label { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-dim); margin-top: 8px; text-align: center; }

  /* ── Error ── */
  #error-box {
    display: none; margin-top: 16px; padding: 12px 16px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px; font-family: 'Source Code Pro', monospace; font-size: 12px; color: #fca5a5;
  }

  /* ── Search section ── */
  #search-section { display: none; }

  .search-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 24px;
  }
  .field-wrap label {
    display: block; font-family: 'Source Code Pro', monospace; font-size: 10px;
    color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
  }
  .field-wrap label .field-icon { margin-right: 4px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 13px; font-family: 'Source Code Pro', monospace;
    font-size: 13px; border-radius: 4px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-dim); }
  .search-input::placeholder { color: var(--text-mute); }

  /* ── Results bar ── */
  .results-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .results-count { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-mute); }
  .results-count strong { color: var(--text); }
  .results-count .gold { color: var(--gold); }
  .filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold); font-family: 'Source Code Pro', monospace; font-size: 11px;
    padding: 3px 8px; border-radius: 3px; cursor: pointer; transition: background 0.15s;
  }
  .filter-tag:hover { background: rgba(201,169,110,0.25); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 12px 16px; text-align: left; border-bottom: 2px solid var(--border2);
    font-family: 'Source Code Pro', monospace; font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; cursor: pointer;
    user-select: none; transition: color 0.15s;
  }
  th:hover { color: var(--gold); }
  th.sorted { color: var(--gold); }
  th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-arrow { opacity: 1; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 11px 16px; font-size: 14px; }
  td.mono { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-dim); }
  td.name-last { font-weight: 600; color: #d8d2c8; }
  td.addr { font-size: 13px; color: var(--text-dim); }
  td.empty-cell { color: var(--text-mute); font-family: 'Source Code Pro', monospace; font-size: 12px; }

  .party-tag {
    display: inline-block; padding: 2px 9px; border-radius: 3px;
    font-family: 'Source Code Pro', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; white-space: nowrap;
  }

  /* ── Empty state ── */
  .empty-state {
    padding: 60px 20px; text-align: center;
    font-family: 'Source Code Pro', monospace; color: var(--text-mute); font-size: 13px;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: 20px; flex-wrap: wrap;
  }
  .pg-btn {
    background: var(--surface); border: 1px solid var(--border2); color: var(--text-dim);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
    font-family: 'Source Code Pro', monospace; font-size: 12px; transition: all 0.15s; min-width: 36px;
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .pg-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .pg-btn.active { background: var(--gold); color: #09090f; border-color: var(--gold); font-weight: 700; }
  .pg-info { font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--text-mute); padding: 0 6px; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2);
    border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Voter Registry <span>Search</span></div>
    <div class="header-meta">Local Database · Fast Search</div>
  </div>
  <div class="header-right">
    <span id="record-count"></span>
    <button class="btn btn-danger" id="btn-new-file" style="display:none" onclick="resetToUpload()">↑ New File</button>
    <button class="btn btn-danger" id="btn-clear" style="display:none" onclick="clearData()">✕ Clear DB</button>
  </div>
</header>

<main>

  <!-- Upload -->
  <div id="upload-section">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <input type="file" id="file-input" accept=".csv" onchange="handleFileSelect(event)">
      <div class="dz-icon">📂</div>
      <div class="dz-title" id="dz-title">Drop your CSV file here</div>
      <div class="dz-sub" id="dz-sub">
        or click to browse &nbsp;·&nbsp; any size supported<br>
        Auto-maps: Voter ID · First Name · Last Name · Address · Town · Party
      </div>
    </div>
    <div id="progress-wrap">
      <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
      <div id="progress-label">Uploading…</div>
    </div>
    <div id="error-box"></div>
  </div>

  <!-- Search -->
  <div id="search-section">
    <div class="search-grid">
      <div class="field-wrap">
        <label><span class="field-icon">🪪</span>Voter ID</label>
        <input class="search-input" id="f-voter-id" placeholder="Search voter ID…" oninput="debounceSearch()">
      </div>
      <div class="field-wrap">
        <label><span class="field-icon">👤</span>First Name</label>
        <input class="search-input" id="f-first" placeholder="Search first name…" oninput="debounceSearch()">
      </div>
      <div class="field-wrap">
        <label><span class="field-icon">👤</span>Last Name</label>
        <input class="search-input" id="f-last" placeholder="Search last name…" oninput="debounceSearch()">
      </div>
      <div class="field-wrap">
        <label><span class="field-icon">🏠</span>Address</label>
        <input class="search-input" id="f-address" placeholder="Search address…" oninput="debounceSearch()">
      </div>
      <div class="field-wrap">
        <label><span class="field-icon">🏙️</span>Town / City</label>
        <input class="search-input" id="f-town" placeholder="Search town…" oninput="debounceSearch()">
      </div>
      <div class="field-wrap">
        <label><span class="field-icon">🗳️</span>Party Affiliation</label>
        <input class="search-input" id="f-party" placeholder="Search party…" oninput="debounceSearch()">
      </div>
    </div>

    <div class="results-bar">
      <div class="results-count" id="results-count"></div>
      <div class="filter-tags" id="filter-tags"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('voter_id')"    id="th-voter_id">    Voter ID    <span class="sort-arrow">⇅</span></th>
            <th onclick="setSort('first_name')"  id="th-first_name">  First Name  <span class="sort-arrow">⇅</span></th>
            <th onclick="setSort('last_name')"   id="th-last_name">   Last Name   <span class="sort-arrow">⇅</span></th>
            <th onclick="setSort('address')"     id="th-address">     Address     <span class="sort-arrow">⇅</span></th>
            <th onclick="setSort('town')"        id="th-town">        Town        <span class="sort-arrow">⇅</span></th>
            <th onclick="setSort('party')"       id="th-party">       Party       <span class="sort-arrow">⇅</span></th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

</main>

<script>
  let currentPage = 1;
  let totalPages  = 1;
  let totalCount  = 0;
  let sortField   = 'last_name';
  let sortDir     = 'asc';
  let debounceTimer;

  // ── On load: check if DB already has records ──────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      if (d.count > 0) {
        showSearchSection(d.count);
        doSearch();
      }
    } catch(e) {}
  });

  // ── File Drag/Drop ────────────────────────────────────────────────────────
  function handleDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
  function handleDragLeave(e) { document.getElementById('drop-zone').classList.remove('over'); }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  }
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) uploadFile(file);
  }

  function uploadFile(file) {
    hideError();
    document.getElementById('dz-title').textContent = `Uploading ${file.name}…`;
    document.getElementById('dz-sub').textContent   = 'Importing into database — this may take a moment for large files';
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-bar-inner').style.width = '0%';
    document.getElementById('progress-label').innerHTML = '<span class="spinner"></span> Processing…';

    // Animate the progress bar while waiting
    let prog = 0;
    const interval = setInterval(() => {
      prog = Math.min(prog + Math.random() * 3, 90);
      document.getElementById('progress-bar-inner').style.width = prog + '%';
    }, 200);

    const fd = new FormData();
    fd.append('file', file);

    fetch('/api/upload', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        clearInterval(interval);
        if (d.error) { showError(d.error); resetUploadUI(); return; }
        document.getElementById('progress-bar-inner').style.width = '100%';
        document.getElementById('progress-label').textContent =
          `✅  ${d.imported.toLocaleString()} records imported in ${d.elapsed}s · Mapped: ${d.mapped_columns.join(', ')}`;
        setTimeout(() => { showSearchSection(d.imported); doSearch(); }, 800);
      })
      .catch(err => {
        clearInterval(interval);
        showError('Upload failed: ' + err.message);
        resetUploadUI();
      });
  }

  function resetUploadUI() {
    document.getElementById('dz-title').textContent = 'Drop your CSV file here';
    document.getElementById('dz-sub').innerHTML = 'or click to browse &nbsp;·&nbsp; any size supported<br>Auto-maps: Voter ID · First Name · Last Name · Address · Town · Party';
    document.getElementById('progress-wrap').style.display = 'none';
  }

  function showSearchSection(count) {
    document.getElementById('upload-section').style.display  = 'none';
    document.getElementById('search-section').style.display  = 'block';
    document.getElementById('btn-new-file').style.display    = 'inline-block';
    document.getElementById('btn-clear').style.display       = 'inline-block';
    document.getElementById('record-count').innerHTML = `<strong>${count.toLocaleString()}</strong> records`;
  }

  function resetToUpload() {
    document.getElementById('upload-section').style.display  = 'block';
    document.getElementById('search-section').style.display  = 'none';
    document.getElementById('btn-new-file').style.display    = 'none';
    document.getElementById('btn-clear').style.display       = 'none';
    document.getElementById('record-count').innerHTML        = '';
    document.getElementById('file-input').value              = '';
    resetUploadUI();
    hideError();
  }

  async function clearData() {
    if (!confirm('Clear all voter records from the database?')) return;
    await fetch('/api/clear', { method: 'POST' });
    resetToUpload();
  }

  // ── Search ────────────────────────────────────────────────────────────────
  function debounceSearch() {
    clearTimeout(debounceTimer);
    currentPage = 1;
    debounceTimer = setTimeout(doSearch, 220);
  }

  function getFilters() {
    return {
      voter_id:   document.getElementById('f-voter-id').value.trim(),
      first_name: document.getElementById('f-first').value.trim(),
      last_name:  document.getElementById('f-last').value.trim(),
      address:    document.getElementById('f-address').value.trim(),
      town:       document.getElementById('f-town').value.trim(),
      party:      document.getElementById('f-party').value.trim(),
    };
  }

  async function doSearch() {
    const filters = getFilters();
    const params  = new URLSearchParams({ ...filters, page: currentPage, sort: sortField, dir: sortDir });
    const r = await fetch('/api/search?' + params);
    const d = await r.json();

    totalPages = d.pages;
    totalCount = d.total;

    renderResults(d.results, d.total, d.page, d.per_page);
    renderPagination(d.page, d.pages, d.total);
    renderFilterTags(filters);
    updateSortHeaders();
  }

  function setSort(field) {
    if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortField = field; sortDir = 'asc'; }
    doSearch();
  }

  function updateSortHeaders() {
    document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
    const th = document.getElementById('th-' + sortField);
    if (th) {
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').textContent = sortDir === 'asc' ? '▲' : '▼';
    }
    document.querySelectorAll('th:not(.sorted) .sort-arrow').forEach(el => el.textContent = '⇅');
  }

  // ── Render ────────────────────────────────────────────────────────────────
  const PARTY_COLORS = {
    democrat: ['#3b82f6','rgba(59,130,246,0.15)'],
    republican: ['#ef4444','rgba(239,68,68,0.15)'],
    independent: ['#8b5cf6','rgba(139,92,246,0.15)'],
    green: ['#22c55e','rgba(34,197,94,0.15)'],
    libertarian: ['#f59e0b','rgba(245,158,11,0.15)'],
    working: ['#ec4899','rgba(236,72,153,0.15)'],
  };

  function partyStyle(p='') {
    const k = p.toLowerCase();
    for (const [name,[fg,bg]] of Object.entries(PARTY_COLORS)) {
      if (k.includes(name)) return `color:${fg};background:${bg};border:1px solid ${fg}44`;
    }
    return 'color:#9a9080;background:rgba(154,144,128,0.12);border:1px solid #9a908044';
  }

  function cell(v, cls='') {
    return v ? `<td class="${cls}">${esc(v)}</td>` : `<td class="empty-cell">—</td>`;
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderResults(rows, total, page, perPage) {
    const start = (page-1)*perPage+1, end = Math.min(page*perPage, total);
    document.getElementById('results-count').innerHTML =
      total === 0
        ? 'No records found'
        : `Showing <span class="gold">${start.toLocaleString()}–${end.toLocaleString()}</span> of <strong>${total.toLocaleString()}</strong> records`;

    const tbody = document.getElementById('results-body');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No records match your search</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        ${cell(r.voter_id, 'mono')}
        ${cell(r.first_name)}
        ${cell(r.last_name, 'name-last')}
        ${cell(r.address, 'addr')}
        ${cell(r.town, 'addr')}
        <td>${r.party ? `<span class="party-tag" style="${partyStyle(r.party)}">${esc(r.party)}</span>` : '<span class="empty-cell">—</span>'}</td>
      </tr>
    `).join('');
  }

  function renderPagination(page, pages, total) {
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    const mkBtn = (label, p, disabled=false, active=false) =>
      `<button class="pg-btn${active?' active':''}" onclick="goPage(${p})" ${disabled?'disabled':''}>${label}</button>`;

    html += mkBtn('«', 1, page===1);
    html += mkBtn('‹', page-1, page===1);

    let lo = Math.max(1, page-3), hi = Math.min(pages, page+3);
    if (lo > 1) html += `<span class="pg-info">…</span>`;
    for (let p=lo; p<=hi; p++) html += mkBtn(p, p, false, p===page);
    if (hi < pages) html += `<span class="pg-info">…</span>`;

    html += mkBtn('›', page+1, page===pages);
    html += mkBtn('»', pages,  page===pages);
    document.getElementById('pagination').innerHTML = html;
  }

  function renderFilterTags(filters) {
    const LABELS = { voter_id:'Voter ID', first_name:'First', last_name:'Last', address:'Address', town:'Town', party:'Party' };
    const tags = Object.entries(filters)
      .filter(([,v]) => v)
      .map(([k,v]) => `<span class="filter-tag" title="Click to clear" onclick="clearFilter('${k}')">${LABELS[k]}: ${esc(v)} ✕</span>`)
      .join('');
    document.getElementById('filter-tags').innerHTML = tags;
  }

  function clearFilter(field) {
    const ids = { voter_id:'f-voter-id', first_name:'f-first', last_name:'f-last', address:'f-address', town:'f-town', party:'f-party' };
    document.getElementById(ids[field]).value = '';
    debounceSearch();
  }

  function goPage(p) { currentPage = p; doSearch(); window.scrollTo(0,0); }

  // ── Error ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }
  function hideError() { document.getElementById('error-box').style.display = 'none'; }
</script>
</body>
</html>
